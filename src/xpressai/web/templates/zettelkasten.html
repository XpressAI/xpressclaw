{% extends "base.html" %}

{% block content %}
<!-- Marked.js for markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<div class="page-header">
    <h2>Zettelkasten Browser</h2>
    <div class="header-controls">
        <select id="agent-filter" class="agent-select" onchange="filterByAgent(this.value)">
            <option value="">All Agents</option>
            {% for agent in agents %}
            <option value="{{ agent.name }}">{{ agent.name }}</option>
            {% endfor %}
        </select>
        <select id="tag-filter" class="agent-select" onchange="filterByTag(this.value)">
            <option value="">All Tags</option>
        </select>
        <input type="text" id="search-input" class="search-input" placeholder="Search content..." onkeyup="debounceSearch()">
    </div>
</div>

<div class="zettel-stats" id="zettel-stats">
    Loading stats...
</div>

<div class="zettel-container">
    <div class="zettel-list" id="zettel-list">
        Loading memories...
    </div>
    <div class="zettel-detail" id="zettel-detail">
        <div class="empty-state">Select a memory to view details</div>
    </div>
</div>

<script>
let currentAgent = '';
let currentTag = '';
let searchTimeout = null;

function filterByAgent(agentId) {
    currentAgent = agentId;
    loadMemories();
    loadTags();
}

function filterByTag(tag) {
    currentTag = tag;
    loadMemories();
}

function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(loadMemories, 300);
}

function loadMemories() {
    const search = document.getElementById('search-input').value;
    let url = '/partials/zettelkasten/list?';
    if (currentAgent) url += `agent=${encodeURIComponent(currentAgent)}&`;
    if (currentTag) url += `tag=${encodeURIComponent(currentTag)}&`;
    if (search) url += `q=${encodeURIComponent(search)}&`;

    htmx.ajax('GET', url, {
        target: '#zettel-list',
        swap: 'innerHTML'
    });

    // Also update stats
    htmx.ajax('GET', `/partials/zettelkasten/stats?agent=${encodeURIComponent(currentAgent)}`, {
        target: '#zettel-stats',
        swap: 'innerHTML'
    });
}

function loadTags() {
    fetch(`/api/zettelkasten/tags?agent=${encodeURIComponent(currentAgent)}`)
        .then(r => r.json())
        .then(tags => {
            const select = document.getElementById('tag-filter');
            select.innerHTML = '<option value="">All Tags</option>';
            tags.forEach(tag => {
                const opt = document.createElement('option');
                opt.value = tag;
                opt.textContent = tag;
                select.appendChild(opt);
            });
        });
}

function viewMemory(memoryId) {
    htmx.ajax('GET', `/partials/zettelkasten/detail/${memoryId}`, {
        target: '#zettel-detail',
        swap: 'innerHTML'
    });

    // Highlight selected
    document.querySelectorAll('.zettel-item').forEach(el => el.classList.remove('selected'));
    document.querySelector(`[data-memory-id="${memoryId}"]`)?.classList.add('selected');
}

async function deleteMemory(memoryId) {
    if (!confirm('Delete this memory?')) return;

    const response = await fetch(`/api/memory/${memoryId}`, { method: 'DELETE' });
    const result = await response.json();

    if (result.status === 'ok') {
        loadMemories();
        document.getElementById('zettel-detail').innerHTML = '<div class="empty-state">Memory deleted</div>';
    } else {
        alert('Failed to delete: ' + (result.error || 'Unknown error'));
    }
}

// Render markdown content in the detail view
function renderMarkdown() {
    const container = document.getElementById('zettel-detail');
    const contentDiv = container.querySelector('.zettel-detail-content');
    if (contentDiv && contentDiv.dataset.rawContent) {
        try {
            // Decode the raw content from base64 and render as markdown
            const rawContent = atob(contentDiv.dataset.rawContent);
            contentDiv.innerHTML = marked.parse(rawContent, {
                breaks: true,  // Convert \n to <br>
                gfm: true      // Enable GitHub Flavored Markdown
            });
        } catch (e) {
            console.error('Markdown rendering error:', e);
        }
    }
}

// Initial load
document.addEventListener('DOMContentLoaded', function() {
    loadMemories();
    loadTags();
    
    // Configure marked.js
    marked.setOptions({
        breaks: true,
        gfm: true
    });
});

// Listen for HTMX content swaps to render markdown
document.body.addEventListener('htmx:afterSwap', function(evt) {
    if (evt.detail.target.id === 'zettel-detail') {
        renderMarkdown();
    }
});
</script>

<style>
.zettel-stats {
    display: flex;
    gap: 2rem;
    padding: 1rem;
    background: var(--bg-secondary);
    border-radius: 8px;
    margin-bottom: 1rem;
}

.zettel-stat {
    text-align: center;
}

.zettel-stat-value {
    font-size: 1.5rem;
    font-weight: bold;
    color: var(--accent);
}

.zettel-stat-label {
    font-size: 0.8rem;
    color: var(--fg-muted);
}

.zettel-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    height: calc(100vh - 280px);
}

.zettel-list {
    background: var(--bg-secondary);
    border-radius: 8px;
    overflow-y: auto;
    padding: 0.5rem;
}

.zettel-detail {
    background: var(--bg-secondary);
    border-radius: 8px;
    overflow-y: auto;
    padding: 1rem;
}

.zettel-item {
    padding: 0.75rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
}

.zettel-item:hover {
    background: rgba(255,255,255,0.03);
}

.zettel-item.selected {
    background: rgba(88, 166, 255, 0.1);
    border-left: 3px solid var(--accent);
}

.zettel-item-summary {
    font-weight: 500;
    margin-bottom: 0.25rem;
}

.zettel-item-meta {
    font-size: 0.75rem;
    color: var(--fg-muted);
    display: flex;
    gap: 0.5rem;
}

.zettel-item-tags {
    display: flex;
    gap: 0.25rem;
    margin-top: 0.25rem;
    flex-wrap: wrap;
}

.zettel-tag {
    background: var(--bg);
    padding: 0.125rem 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    color: var(--fg-muted);
}

.zettel-detail-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.75rem;
    margin-bottom: 1rem;
}

.zettel-detail-summary {
    font-size: 1.1rem;
    font-weight: 500;
    margin-bottom: 0.5rem;
}

.zettel-detail-content {
    font-family: inherit;
    line-height: 1.6;
    margin-bottom: 1rem;
    padding: 1rem;
    background: var(--bg);
    border-radius: 6px;
}

/* Markdown content styles */
.zettel-detail-content h1,
.zettel-detail-content h2,
.zettel-detail-content h3,
.zettel-detail-content h4,
.zettel-detail-content h5,
.zettel-detail-content h6 {
    margin-top: 1rem;
    margin-bottom: 0.5rem;
    color: var(--fg);
}

.zettel-detail-content h1 { font-size: 1.5rem; }
.zettel-detail-content h2 { font-size: 1.3rem; }
.zettel-detail-content h3 { font-size: 1.1rem; }

.zettel-detail-content p {
    margin-bottom: 0.75rem;
}

.zettel-detail-content code {
    background: rgba(255, 255, 255, 0.1);
    padding: 0.125rem 0.375rem;
    border-radius: 4px;
    font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
    font-size: 0.9em;
}

.zettel-detail-content pre {
    background: rgba(0, 0, 0, 0.3);
    padding: 1rem;
    border-radius: 6px;
    overflow-x: auto;
    margin-bottom: 1rem;
}

.zettel-detail-content pre code {
    background: none;
    padding: 0;
}

.zettel-detail-content ul,
.zettel-detail-content ol {
    margin-left: 1.5rem;
    margin-bottom: 0.75rem;
}

.zettel-detail-content li {
    margin-bottom: 0.25rem;
}

.zettel-detail-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 1rem;
    margin-left: 0;
    margin-bottom: 0.75rem;
    color: var(--fg-muted);
    font-style: italic;
}

.zettel-detail-content a {
    color: var(--accent);
    text-decoration: none;
}

.zettel-detail-content a:hover {
    text-decoration: underline;
}

.zettel-detail-content table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 1rem;
}

.zettel-detail-content th,
.zettel-detail-content td {
    border: 1px solid var(--border);
    padding: 0.5rem;
    text-align: left;
}

.zettel-detail-content th {
    background: rgba(255, 255, 255, 0.05);
}

.zettel-detail-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1rem 0;
}

.zettel-detail-content img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
}

.zettel-detail-section {
    margin-top: 1rem;
}

.zettel-detail-section h4 {
    font-size: 0.85rem;
    color: var(--fg-muted);
    margin-bottom: 0.5rem;
}

.zettel-links {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}

.zettel-link {
    padding: 0.5rem;
    background: var(--bg);
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85rem;
}

.zettel-link:hover {
    background: rgba(255,255,255,0.05);
}

.zettel-detail-actions {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
}
</style>
{% endblock %}
