{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h2>Agent Logs</h2>
    <select id="agent-select" name="agent" hx-get="/partials/logs" hx-trigger="change" hx-target="#log-output" hx-include="this">
        <option value="">All Agents</option>
        {% for agent in agents %}
        <option value="{{ agent.name }}">{{ agent.name }}</option>
        {% endfor %}
    </select>
</div>

<div class="card log-container">
    <div id="log-output"
         hx-get="/partials/logs"
         hx-trigger="load, every 2s"
         hx-swap="innerHTML">
        Loading...
    </div>
</div>
{% endblock %}
