name: CI

on:
  push:
    branches: [rust-rewrite, main]
  pull_request:
    branches: [rust-rewrite, main]

jobs:
  # Frontend type checking (independent of Bazel)
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run check
      - run: npm run build

  # Bazel builds everything — frontend, Rust, C++ — from one graph
  bazel:
    name: Bazel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPOS_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # System dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf cmake

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install cmake

      # Bazelisk reads .bazelversion and downloads the right Bazel
      - name: Install Bazelisk
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            brew install bazelisk
          else
            sudo curl -L https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o /usr/local/bin/bazel
            sudo chmod +x /usr/local/bin/bazel
          fi

      # npm ci: install frontend deps so the Bazel genrule can skip it.
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      # build.sh with --skip-tauri (CI doesn't build desktop app),
      # --skip-docker (no Docker images needed), --skip-check (separate step below).
      - name: Build and test
        run: bash build.sh --skip-tauri --skip-docker --skip-check

      # Still use Cargo for fmt/clippy — Bazel doesn't have good equivalents
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt -p xpressclaw-core -p xpressclaw-server -p xpressclaw-cli -p xpressclaw-tauri -- --check

      - name: Clippy
        run: cargo clippy -p xpressclaw-core -p xpressclaw-server -p xpressclaw-cli -p xpressclaw-tauri --all-targets -- -D warnings

  # Integration tests that require API keys
  integration:
    name: Integration Tests
    needs: bazel
    runs-on: ubuntu-latest
    environment: integration
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPOS_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Build frontend for rust-embed (integration tests use Cargo)
      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Run integration tests
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: cargo test -p xpressclaw-server -p xpressclaw-core -- --ignored --skip llamacpp