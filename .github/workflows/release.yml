name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            label: macOS-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPOS_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # System dependencies
      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Windows build deps
        if: runner.os == 'Windows'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      # macOS: install certificate for signing
      - name: Install Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db

      # Pre-warm cargo git cache for llama-cpp-rs submodule.
      - name: Fetch Cargo dependencies
        run: cargo fetch

      # Write notarization API key before build (macOS signing requires it).
      - name: Write API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APPLE_API_KEY_CONTENT" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      # macOS: build with build.sh (Cargo + Tauri)
      - name: Build (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
        run: bash build.sh --skip-test --skip-docker --skip-check --target=${{ matrix.target }}

      # Windows
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: powershell -File build.ps1 --skip-docker --skip-check --target=${{ matrix.target }}

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: xpressclaw-${{ matrix.label }}.dmg
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Windows MSI
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: xpressclaw-${{ matrix.label }}.msi
          path: target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload Windows NSIS installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: xpressclaw-${{ matrix.label }}.exe
          path: target/${{ matrix.target }}/release/bundle/nsis/*.exe

  pre-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for release number

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Compute release number
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Count releases so far (tags matching beta-* or v*) + 1
          RELEASE_COUNT=$(git tag -l 'beta-*' 'v*' | wc -l | tr -d ' ')
          NEXT_NUM=$((RELEASE_COUNT + 1))
          TAG="beta-${NEXT_NUM}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG (commit $SHORT_SHA)"

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "Beta ${{ steps.meta.outputs.tag }} (${{ steps.meta.outputs.sha }})"
          body: |
            Pre-release build from `main` at ${{ github.sha }}.

            **Downloads:**
            - macOS (Apple Silicon): `.dmg` arm64 — signed and notarized
            - macOS (Intel): `.dmg` x64 — signed and notarized
            - Windows: `.exe` NSIS installer, `.msi` MSI installer
          prerelease: true
          make_latest: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}