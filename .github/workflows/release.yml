name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            label: macOS-x64
          # Windows disabled — rules_rust crate_universe has path length
          # issues with llama.cpp on Windows (os error 123). Tracked in XCLAW-13.
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   label: Windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPOS_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # System dependencies
      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install cmake bazelisk

      # macOS: install certificate for signing
      - name: Install Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db

      # cargo fetch: pre-warm git cache — llama-cpp-rs submodule download
      # can exceed crate_universe's default 600s timeout on cold runners.
      - name: Fetch Cargo dependencies
        run: cargo fetch

      # npm ci: install frontend deps so the Bazel genrule can skip it.
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      # Write notarization API key before build (macOS signing requires it).
      - name: Write API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APPLE_API_KEY_CONTENT" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      # build.sh with --skip-test (CI job handles that), --skip-docker
      # (no Docker needed for release artifacts), --skip-check (CI job),
      # and --target to set the matrix target triple.
      - name: Build
        env:
          CARGO_BAZEL_TIMEOUT: "1800"
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
        run: bash build.sh --skip-test --skip-docker --skip-check --target=${{ matrix.target }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: xpressclaw-${{ matrix.label }}.dmg
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      # Windows disabled — re-enable when rules_rust crate_universe
      # path issues are resolved (XCLAW-13)
      # - name: Upload Windows MSI
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: xpressclaw-${{ matrix.label }}.msi
      #     path: target/${{ matrix.target }}/release/bundle/msi/*.msi

      # - name: Upload Windows NSIS installer
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: xpressclaw-${{ matrix.label }}.exe
      #     path: target/${{ matrix.target }}/release/bundle/nsis/*.exe

  pre-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create or update pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (${{ steps.sha.outputs.short }})"
          body: |
            Automated pre-release build from `main` at ${{ github.sha }}.

            **Downloads:**
            - macOS (Apple Silicon): `.dmg` arm64 — signed and notarized
            - macOS (Intel): `.dmg` x64 — signed and notarized
            - Windows: coming soon (Bazel path issues, XCLAW-13)
          prerelease: true
          make_latest: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}