name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  build-tauri:
    needs: frontend
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPOS_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install cmake bazelisk

      # macOS: install certificate for signing
      - name: Install Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      # Build CLI sidecar via Bazel (same as build.sh)
      - name: Build CLI sidecar
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cargo build --release --target ${{ matrix.target }} -p xpressclaw-cli
            mkdir -p crates/xpressclaw-tauri/binaries
            cp target/${{ matrix.target }}/release/xpressclaw.exe \
               crates/xpressclaw-tauri/binaries/xpressclaw-${{ matrix.target }}.exe
          else
            bazel build //crates/xpressclaw-cli:xpressclaw
            mkdir -p crates/xpressclaw-tauri/binaries
            cp bazel-bin/crates/xpressclaw-cli/xpressclaw \
               crates/xpressclaw-tauri/binaries/xpressclaw-${{ matrix.target }}
          fi
        shell: bash

      # macOS: write App Store Connect API key for notarization
      - name: Write API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APPLE_API_KEY_CONTENT" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      # Build Tauri app (with signing + notarization on macOS)
      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
        run: npx @tauri-apps/cli build --target ${{ matrix.target }}

      # macOS: upload .dmg
      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: xpressclaw-${{ matrix.label }}.dmg
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      # Windows: upload .msi and .exe (NSIS)
      - name: Upload Windows MSI
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: xpressclaw-${{ matrix.label }}.msi
          path: target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload Windows NSIS installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: xpressclaw-${{ matrix.label }}.exe
          path: target/${{ matrix.target }}/release/bundle/nsis/*.exe

  pre-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create or update pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (${{ steps.sha.outputs.short }})"
          body: |
            Automated pre-release build from `main` at ${{ github.sha }}.

            **Downloads:**
            - macOS (Apple Silicon): `.dmg` arm64 — signed and notarized
            - macOS (Intel): `.dmg` x64 — signed and notarized
            - Windows: `.msi` or `.exe` installer
          prerelease: true
          make_latest: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
