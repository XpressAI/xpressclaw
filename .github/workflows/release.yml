name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            label: macOS-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPOS_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # System dependencies
      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install cmake bazelisk

      - name: Install Windows build deps
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install bazelisk -y
          # cmake is pre-installed on windows-latest
          # Point Bazel to Git Bash for genrule shell commands
          echo "BAZEL_SH=C:/Program Files/Git/bin/bash.exe" >> "$GITHUB_ENV"
          # Enable long paths — llama.cpp submodule paths exceed Windows 260-char limit
          git config --system core.longpaths true

      # Windows: shorten Bazel output base to avoid path length issues.
      # Default is C:/users/runneradmin/_bazel_runneradmin/<hash>/ which,
      # combined with crate_universe's cargo home and llama.cpp's deep tree,
      # exceeds Windows MAX_PATH even with longpaths enabled.
      - name: Enable Windows long paths (OS level)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          mkdir C:\b -Force

      # macOS: install certificate for signing
      - name: Install Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH login.keychain-db

      # Install frontend dependencies so Bazel genrule skips npm ci
      - name: Install frontend dependencies
        run: cd frontend && npm ci

      # Pre-warm cargo's git cache — llama-cpp-rs downloads the large
      # llama.cpp submodule. cargo-bazel's default 600s timeout isn't
      # enough on cold Windows CI runners.
      - name: Fetch Cargo dependencies
        run: cargo fetch

      # Build CLI sidecar via Bazel — handles frontend, Rust, and C++ deps.
      # Each runner builds natively for its own architecture (no cross-compilation).
      - name: Build CLI sidecar
        shell: bash
        env:
          CARGO_BAZEL_GENERATOR_TIMEOUT: "1800"
        run: |
          BAZEL_ARGS=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            BAZEL_ARGS="--output_base=C:/b"
          fi
          bazel $BAZEL_ARGS build //crates/xpressclaw-cli:xpressclaw
          mkdir -p crates/xpressclaw-tauri/binaries
          EXT=""
          if [ "$RUNNER_OS" = "Windows" ]; then EXT=".exe"; fi
          cp "bazel-bin/crates/xpressclaw-cli/xpressclaw${EXT}" \
             "crates/xpressclaw-tauri/binaries/xpressclaw-${{ matrix.target }}${EXT}"

      # macOS: write App Store Connect API key for notarization
      - name: Write API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APPLE_API_KEY_CONTENT" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      # Build Tauri app (with signing + notarization on macOS)
      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
        run: npx @tauri-apps/cli build --target ${{ matrix.target }}

      # macOS: upload .dmg
      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: xpressclaw-${{ matrix.label }}.dmg
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      # Windows: upload .msi and .exe (NSIS)
      - name: Upload Windows MSI
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: xpressclaw-${{ matrix.label }}.msi
          path: target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload Windows NSIS installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: xpressclaw-${{ matrix.label }}.exe
          path: target/${{ matrix.target }}/release/bundle/nsis/*.exe

  pre-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create or update pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (${{ steps.sha.outputs.short }})"
          body: |
            Automated pre-release build from `main` at ${{ github.sha }}.

            **Downloads:**
            - macOS (Apple Silicon): `.dmg` arm64 — signed and notarized
            - macOS (Intel): `.dmg` x64 — signed and notarized
            - Windows: `.msi` or `.exe` installer
          prerelease: true
          make_latest: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}