name: Build & Push Harness Images

on:
  push:
    branches: [main]
    paths:
      - 'harnesses/**'
  pull_request:
    branches: [main]
    paths:
      - 'harnesses/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/xpressai

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: harnesses/base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/xpressclaw-harness-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-harnesses:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        harness: [claude-sdk, xaibo, langchain]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      # Base image is already pushed by build-base job
      - uses: docker/build-push-action@v6
        with:
          context: harnesses/${{ matrix.harness }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/xpressclaw-harness-${{ matrix.harness }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
